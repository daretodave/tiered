name: march

# Cloud half of the tiered.tv autonomous loop. One invocation =
# one /march tick. State of truth is the repo on origin/main;
# every tick reads it fresh, no memory between runs.
#
# Schedule: every 40 minutes (cron `*/40 * * * *` → fires at :00
# and :40, so the gap alternates 40min/20min — ~1.5 ticks/hour)
# + manual dispatch. Enabled 2026-05-13 after vetting the first
# Opus tick (phase 19a shipped clean in 30m). Concurrency group
# below serializes overlapping ticks. Daily commit ceiling (40
# cloud-shipped / 24h) bounds runaway volume.
#
# See .github/CLOUD_LOOP.md for setup, debugging, and the upgrade
# path.

on:
  schedule:
    - cron: '*/40 * * * *'   # every 40 min UTC (fires :00 and :40)
  workflow_dispatch:

concurrency:
  # Serialize ticks. A long-running tick blocks the next firing
  # rather than racing the working tree.
  group: march
  cancel-in-progress: false

jobs:
  march:
    runs-on: ubuntu-latest
    # 6h is the GH-Actions hard limit; 5h leaves headroom. Most
    # ticks finish in under 15min; the long tail is /ship-a-phase
    # doing a full prerendered build with hermetic e2e.
    timeout-minutes: 300
    permissions:
      contents: write   # push back to main
      issues: write     # /triage labels + cloud-failed issue
      id-token: write   # Claude Code Action's OIDC handshake
    steps:
      - name: Checkout (full history for /march dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so git push commits as the
          # human user, not as github-actions[bot]. Required for
          # uniform git log per tiered.tv's posture.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hermetic e2e cache. Phase 3 wires the harness; until then
      # this step is a no-op (apps/e2e/ doesn't exist yet).
      - name: Cache Playwright browsers
        if: hashFiles('apps/e2e/package.json') != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only)
        if: hashFiles('apps/e2e/package.json') != ''
        run: pnpm e2e:install

      # Supabase CLI for the hermetic e2e leg. Docker is pre-installed
      # on ubuntu-latest; setup-cli adds the `supabase` binary. The
      # playwright webServer chain in apps/e2e/playwright.config.ts
      # then runs `supabase start` (idempotent — fast cache hit if
      # we pre-start here) and `supabase db reset --no-seed` before
      # `next start`. Skipped if supabase/ isn't on the branch yet.
      - name: Install Supabase CLI
        if: hashFiles('supabase/config.toml') != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pre-start Supabase containers
        if: hashFiles('supabase/config.toml') != ''
        run: supabase start
        timeout-minutes: 5

      - name: Daily commit ceiling check
        id: ceiling
        run: |
          # Cloud commits are identified by the `Cloud-Run:` trailer
          # the agent appends to every commit message (per agents.md
          # §2 carve-out). Both cloud and local commits are authored
          # by daretodave, so we distinguish via trailer. The ceiling
          # bounds *cloud-shipped volume* in 24h; local commits
          # don't count.
          since="$(date -u -d '24 hours ago' '+%Y-%m-%d %H:%M:%S')"
          count=$(git log --since="$since" --grep='Cloud-Run:' --oneline | wc -l | tr -d ' ')
          echo "Cloud-shipped commits in last 24h: $count"
          # Ceiling: 40/day — paired with the every-40-min cron
          # (~1.5 ticks/hour ≈ 36 scheduled ticks/day) so every
          # scheduled tick has headroom. Reduce if the weekly cap
          # pinches.
          if [ "$count" -ge 40 ]; then
            echo "Cloud ceiling reached (40 cloud-shipped commits / 24h). Exiting cleanly — no work this tick."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Git author identity is set via env vars on the Claude Code
      # action step below, NOT via `git config`. The action runs
      # its own internal `git config user.name "claude[bot]"` AFTER
      # any preceding workflow step, which would override repo-local
      # config silently. The only reliable override is the
      # GIT_AUTHOR_* / GIT_COMMITTER_* env-var path — git checks env
      # vars first when reading author identity at `git commit` time,
      # before falling back to config.

      - name: Run /march (cloud mode)
        id: claude_run
        if: steps.ceiling.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth token bills against the user's Claude Pro/Max
          # subscription. $0 marginal cost; quota shared with local
          # sessions. (Alternative: ANTHROPIC_API_KEY for
          # pay-per-token — not used.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Opus — the cloud loop is doing real design + content
          # work (phases 19a–19e and the content-velocity endgame)
          # where Sonnet undersells. Headroom on the weekly cap is
          # the gate; if we hit it, drop back to claude-sonnet-4-6.
          claude_args: |
            --model claude-opus-4-7
            --dangerously-skip-permissions
          prompt: |
            You are running tiered.tv's autonomous loop in CI (GitHub Actions).
            Read agents.md first for the standing rules — they all apply.

            Cloud-mode adjustments on top of agents.md:

            1. Skip /oversight entirely. It is interactive and never runs in cloud.
            2. Skip /critique. The reader sub-agent depends on a Chrome MCP that is not available on the runner. /critique stays a local-only ritual.
            3. /expand may run; candidates land in plan/PHASE_CANDIDATES.md. Promotion happens only via local /oversight — do not promote candidates from cloud.
            4. The verify gate (`pnpm verify`) and deploy gate (`pnpm deploy:check`) are non-negotiable. Same as local. NEVER --no-verify.
            5. Commit author is the human user via GIT_AUTHOR_* / GIT_COMMITTER_* env vars (already configured by the workflow). Do not run `git config user.*` to change it — the env vars take precedence anyway.
            6. EVERY commit you ship in this tick MUST end with this exact trailer (a blank line before it, then the trailer as its own line):

                  Cloud-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

               This is how the next tick's ceiling check distinguishes cloud-shipped commits from the user's local work — both have the same author. If a commit lacks this trailer it does not count toward the cloud ceiling, which would let the loop run away. Treat the trailer as non-negotiable, like the verify gate. agents.md's "no Co-Authored-By trailers, plain commit message bodies" rule has an explicit carve-out for this single trailer; nothing else.
            7. If the tick cannot ship cleanly (red verify, red deploy, blocked phase, no work to do, anything else), do NOT half-commit. Either:
               - exit cleanly with a one-line note in the action log explaining why no work shipped this tick, or
               - if there is a real failure to surface, open a GitHub issue with `gh issue create --title "Cloud march failed: <iso-date>" --body "<context + run URL>"` and exit. Do not pass `--label` — the issue lands unlabeled and the next scheduled tick's /triage classifies and labels it appropriately.

            The dispatch order is the standard /march order from skills/march.md: triage → critique (skipped) → ship-a-phase → ship-data → ship-content → expand → iterate.

            Begin. One tick. One commit-and-push (or no-op). Then exit.
        env:
          # Deploy gate
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ vars.VERCEL_PROJECT }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          # ACTIONS_PAT (not GITHUB_TOKEN) so the agent's `gh` calls
          # and any direct git operations identify as the human, not
          # as the bot.
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Auth0
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
          AUTH0_BASE_URL: ${{ secrets.AUTH0_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          # OpenAI (runtime moderation pre-filter)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Hermetic e2e: keep the Vercel Analytics beacon clean
          DISABLE_ANALYTICS: '1'
          # Git author identity (overrides the action's internal
          # `git config user.* "claude[bot]"` step at commit-time).
          GIT_AUTHOR_NAME:     'David Rehmat'
          GIT_AUTHOR_EMAIL:    'me@dave.blue'
          GIT_COMMITTER_NAME:  'David Rehmat'
          GIT_COMMITTER_EMAIL: 'me@dave.blue'

      - name: Open cloud-failed issue if action crashed
        # Safety net for the case where Claude Code itself crashed
        # (auth error, runner OOM, etc.) before the agent could
        # open the issue per its brief. Only fires on genuine
        # non-zero exit.
        if: failure() && steps.ceiling.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          existing=$(gh issue list --search 'in:title "Cloud march tick crashed" state:open' --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh issue create \
              --title "Cloud march tick crashed: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --body "Action exited non-zero before the agent could file its own issue. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "An open 'Cloud march tick crashed' issue already exists — skipping dedupe."
          fi
