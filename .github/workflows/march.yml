name: march

# Cloud half of the tiered.tv autonomous loop. One invocation =
# one /march tick. State of truth is the repo on origin/main;
# every tick reads it fresh, no memory between runs.
#
# Schedule: every 40 minutes (cron `*/40 * * * *` → fires at :00
# and :40, so the gap alternates 40min/20min — ~1.5 ticks/hour)
# + manual dispatch. Enabled 2026-05-13 after vetting the first
# Opus tick (phase 19a shipped clean in 30m). Concurrency group
# below serializes overlapping ticks. Daily commit ceiling (60
# cloud-shipped / 24h) bounds runaway volume.
#
# See .github/CLOUD_LOOP.md for setup, debugging, and the upgrade
# path.

on:
  schedule:
    - cron: '*/40 * * * *'   # every 40 min UTC (fires :00 and :40)
  workflow_dispatch:

concurrency:
  # Serialize ticks. A long-running tick blocks the next firing
  # rather than racing the working tree.
  group: march
  cancel-in-progress: false

jobs:
  march:
    runs-on: ubuntu-latest
    # 6h is the GH-Actions hard limit; 5h leaves headroom. Most
    # ticks finish in under 15min; the long tail is /ship-a-phase
    # doing a full prerendered build with hermetic e2e.
    timeout-minutes: 300
    permissions:
      contents: write   # push back to main
      issues: write     # /triage labels + cloud-failed issue
      id-token: write   # Claude Code Action's OIDC handshake
    steps:
      - name: Checkout (full history for /march dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so git push commits as the
          # human user, not as github-actions[bot]. Required for
          # uniform git log per tiered.tv's posture.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hermetic e2e cache. Phase 3 wires the harness; until then
      # this step is a no-op (apps/e2e/ doesn't exist yet).
      - name: Cache Playwright browsers
        if: hashFiles('apps/e2e/package.json') != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only)
        if: hashFiles('apps/e2e/package.json') != ''
        run: pnpm e2e:install

      # Supabase CLI for the hermetic e2e leg. Docker is pre-installed
      # on ubuntu-latest; setup-cli adds the `supabase` binary. The
      # playwright webServer chain in apps/e2e/playwright.config.ts
      # then runs `supabase start` (idempotent — fast cache hit if
      # we pre-start here) and `supabase db reset --no-seed` before
      # `next start`. Skipped if supabase/ isn't on the branch yet.
      - name: Install Supabase CLI
        if: hashFiles('supabase/config.toml') != ''
        uses: supabase/setup-cli@v1
        with:
          # Pinned (issue #416/#480) — see e2e-full.yml for rationale.
          version: 2.106.0

      - name: Pre-start Supabase containers
        if: hashFiles('supabase/config.toml') != ''
        run: supabase start
        timeout-minutes: 5

      - name: Daily commit ceiling check
        id: ceiling
        run: |
          # Cloud commits are identified by the `Cloud-Run:` trailer
          # the agent appends to every commit message (per agents.md
          # §2 carve-out). Both cloud and local commits are authored
          # by daretodave, so we distinguish via trailer. The ceiling
          # bounds *cloud-shipped volume* in 24h; local commits
          # don't count.
          since="$(date -u -d '24 hours ago' '+%Y-%m-%d %H:%M:%S')"
          count=$(git log --since="$since" --grep='Cloud-Run:' --oneline | wc -l | tr -d ' ')
          echo "Cloud-shipped commits in last 24h: $count"
          # Ceiling: 60/day — paired with the every-40-min cron
          # (~1.5 ticks/hour ≈ 36 scheduled ticks/day) the ceiling
          # leaves room for manual-dispatch ticks and same-tick
          # multi-commit shipping. Reduce if the weekly cap
          # pinches.
          if [ "$count" -ge 60 ]; then
            echo "Cloud ceiling reached (60 cloud-shipped commits / 24h). Exiting cleanly — no work this tick."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Git author identity is set via env vars on the Claude Code
      # action step below, NOT via `git config`. The action runs
      # its own internal `git config user.name "claude[bot]"` AFTER
      # any preceding workflow step, which would override repo-local
      # config silently. The only reliable override is the
      # GIT_AUTHOR_* / GIT_COMMITTER_* env-var path — git checks env
      # vars first when reading author identity at `git commit` time,
      # before falling back to config.

      - name: Run /march (cloud mode)
        id: claude_run
        if: steps.ceiling.outputs.skip != 'true'
        # Pure backstop, not the mechanism. The cloud post-result
        # exit hang was root-caused 2026-05-17: the agent backgrounded
        # `pnpm verify` (it had grown past a foreground budget), the
        # SDK ended the turn while the gate was still alive, the
        # background-task resume notification is unreliable in a
        # non-interactive run, so the agent never resumed (no commit)
        # and the gate's children (next-server/chromium/Supabase) kept
        # the process tree alive so `claude` could not exit. The fix
        # is in the prompt below: the gate runs FOREGROUND, split into
        # per-leg blocking calls with their own bounded timeouts,
        # never `run_in_background`. A clean tick now self-exits
        # (proven by the full-output diagnostic run 25990026568). This
        # cap only ever fires on a genuinely wedged tick. 90min covers
        # the observed legit max (~75min for a heavy ship-a-phase:
        # ~20-40min authoring + ~30min cold gate + push/deploy:check)
        # with headroom; the watchdog is gone.
        timeout-minutes: 90
        # GitHub requires the FULL 40-char commit SHA for a SHA pin;
        # an abbreviated ref fails hard at "Set up job" before any
        # step runs. (Learned 2026-05-16.) NOTE: pinning the action
        # does NOT pin the Claude CLI — the action installs the latest
        # CLI at runtime regardless (logs show `Installing Claude Code
        # v2.1.x`). The pin is drift-control on the action wrapper
        # only; it was never the hang's cause or cure.
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1.0.122
        with:
          # OAuth token bills against the user's Claude Pro/Max
          # subscription. $0 marginal cost; quota shared with local
          # sessions. (Alternative: ANTHROPIC_API_KEY for
          # pay-per-token — not used.)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sonnet — cheapest model that runs the loop. The cloud
          # loop bills against the subscription weekly cap; Sonnet
          # keeps each tick cheap and leaves the most headroom.
          # Bumped 2026-07-03 (readopt): claude-sonnet-4-6 →
          # claude-sonnet-5. If a tick genuinely needs Opus-grade
          # design/content judgment, bump to claude-opus-4-8 for
          # that work (ids age — verify before changing).
          claude_args: |
            --model claude-sonnet-5
            --dangerously-skip-permissions
          prompt: |
            You are running tiered.tv's autonomous loop in CI (GitHub Actions).
            Read agents.md first for the standing rules — they all apply.

            Cloud-mode adjustments on top of agents.md:

            1. Skip /oversight entirely. It is interactive and never runs in cloud.
            2. /critique may run. Phase 40 shipped a CI-capable reader path — `scripts/critique-walk.mjs` drives the already-cached headless chromium in a fresh isolated context (reader.md "Path A2 — Playwright (CI)"); no Chrome MCP is needed. Dispatch /critique ONLY when /march Step 2's gate opens (shipping-mode ended + rate-limit window clear + green deploy + no pending HIGH finding); the gate logic in skills/march.md Step 2 is unchanged and authoritative — do not re-implement or relax it here. The authed pass needs a fresh `__session` cookie: /critique's own Step 0 pre-flight mints it at runtime with `node scripts/mint-e2e-cookie.mjs` (the AUTH0_* + E2E_USER_* secrets it needs are already in this job's env — the same path the hermetic e2e leg uses). The cookie is short-lived and rotates; there is NO static cookie secret. If the mint fails, /critique runs the anon pass only — follow skills/critique.md exactly, do not improvise a cookie source. /critique never mutates — it only files rows to plan/CRITIQUE.md.
            3. /expand may run; candidates land in plan/PHASE_CANDIDATES.md. Promotion happens only via local /oversight — do not promote candidates from cloud.
            4. The verify gate and deploy gate (`pnpm deploy:check`) are non-negotiable. NEVER --no-verify. CRITICAL — run the gate FOREGROUND, never `run_in_background`. Backgrounding the gate is the single cause of the cloud exit hang (root-caused 2026-05-17): the SDK ends your turn while the gate is still alive, the resume notification is unreliable here, and the run wedges with no commit. Run the gate as THREE sequential, blocking foreground calls — not one `pnpm verify`, and never piped through `tail` (you need the full failure output):
                 - call 1 (fast gate, timeout 10 min): `pnpm tokens && pnpm typecheck && pnpm check:no-raw-img && pnpm check:test-colocation && pnpm test:run && pnpm test:scripts && pnpm content:check`
                 - call 2 (build, timeout 15 min): `pnpm build`
                 - call 3 (e2e, timeout 30 min): `pnpm --dir apps/e2e exec playwright test --reporter=list`
               All three green == the verify gate passed; treat any red leg exactly as a red `pnpm verify`. Set each call's timeout to the value above and wait for it to finish — do not start the next leg until the previous one returns. Do not background any of them, ever.
            5. Commit author is the human user via GIT_AUTHOR_* / GIT_COMMITTER_* env vars (already configured by the workflow). Do not run `git config user.*` to change it — the env vars take precedence anyway.
            6. EVERY commit you ship in this tick MUST end with this exact trailer (a blank line before it, then the trailer as its own line):

                  Cloud-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

               This is how the next tick's ceiling check distinguishes cloud-shipped commits from the user's local work — both have the same author. If a commit lacks this trailer it does not count toward the cloud ceiling, which would let the loop run away. Treat the trailer as non-negotiable, like the verify gate. agents.md's "no Co-Authored-By trailers, plain commit message bodies" rule has an explicit carve-out for this single trailer; nothing else.
            7. If the tick cannot ship cleanly (red verify, red deploy, blocked phase, no work to do, anything else), do NOT half-commit. Either:
               - exit cleanly with a one-line note in the action log explaining why no work shipped this tick, or
               - if there is a real failure to surface, open a GitHub issue with `gh issue create --title "Cloud march failed: <iso-date>" --body "<context + run URL>"` and exit. Do not pass `--label` — the issue lands unlabeled and the next scheduled tick's /triage classifies and labels it appropriately.

            8. When the tick is done — after commit+push+deploy:check, OR after deciding no-op, OR after opening the failure issue — simply stop and end your turn. Do NOT background anything before ending, and do not push done-markers or run teardown commands: the workflow's post-step drains any stray servers, and the process exits on its own once your turn ends — but ONLY if no gate was left backgrounded (see item 4). Run nothing speculative after your last substantive action.

            The dispatch order is the standard /march order from skills/march.md: triage → critique → ship-a-phase → ship-data → ship-content → expand → iterate.

            Begin. One tick. One commit-and-push (or no-op). Then end your turn.
        env:
          # Deploy gate
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ vars.VERCEL_PROJECT }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          # ACTIONS_PAT (not GITHUB_TOKEN) so the agent's `gh` calls
          # and any direct git operations identify as the human, not
          # as the bot.
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          # NOTE: the cloud /critique authed pass does NOT need a
          # cookie secret here. CRITIQUE_SESSION_COOKIE is a
          # short-lived encrypted __session cookie minted at runtime
          # by `scripts/mint-e2e-cookie.mjs` (/critique Step 0
          # pre-flight) from the AUTH0_* + E2E_USER_* secrets below —
          # the same path the hermetic e2e leg uses. It rotates ~daily,
          # so a static GitHub secret would be stale; do not add one.
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          # Auth0
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
          AUTH0_BASE_URL: ${{ secrets.AUTH0_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          # OpenAI (runtime moderation pre-filter)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Hermetic e2e: keep the Vercel Analytics beacon clean
          DISABLE_ANALYTICS: '1'
          # Git author identity (overrides the action's internal
          # `git config user.* "claude[bot]"` step at commit-time).
          GIT_AUTHOR_NAME:     'David Rehmat'
          GIT_AUTHOR_EMAIL:    'me@dave.blue'
          GIT_COMMITTER_NAME:  'David Rehmat'
          GIT_COMMITTER_EMAIL: 'me@dave.blue'

      # Drain anything the tick left alive so the runner can finalize
      # promptly instead of stalling in post-job orphan cleanup. The
      # action can leave the `claude` CLI plus servers the verify
      # chain spawned (Playwright webServer's `next start`, the
      # pre-started Supabase Docker stack) in the process tree. Runs
      # even on the step timeout / failure. All best-effort.
      - name: Drain stray servers
        if: always()
        run: |
          pkill -f 'next start'  || true
          pkill -f 'next-server' || true
          pkill -f 'playwright'  || true
          supabase stop --no-backup || true
          docker ps -q | xargs -r docker kill || true
          echo "drain complete"

      - name: Open cloud-failed issue if action crashed
        # Safety net for the case where Claude Code itself crashed
        # (auth error, runner OOM, etc.) before the agent could
        # open the issue per its brief. Only fires on genuine
        # non-zero exit.
        if: failure() && steps.ceiling.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          # Staleness bound (candidate #32): a stale open issue (#398, a
          # month old) silently absorbed the 2026-07-10 crash. Recent
          # match -> comment the run link; no recent match -> file fresh.
          cutoff=$(date -u -d '14 days ago' +%Y-%m-%d)
          existing=$(gh issue list --search "in:title \"Cloud march tick crashed\" state:open updated:>=$cutoff" --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh issue create \
              --title "Cloud march tick crashed: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --body "Action exited non-zero before the agent could file its own issue. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "Recently-updated open issue #$existing matches — appending this run's link instead of filing a duplicate."
            gh issue comment "$existing" --body "Recurred $(date -u +%Y-%m-%dT%H:%M:%SZ). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
