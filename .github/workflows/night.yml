name: night

# The night shift: one /digest tick a day. Writes plan/DIGEST.md
# — the morning briefing, the content saga's progress report —
# from the day's pulse. The breadth e2e stays with e2e-full.yml
# (~23:25 UTC); the digest READS that run's conclusion instead of
# re-running it, so this job needs no Docker/Supabase stack and
# no Playwright. The digest commit is notes-only (plan/ prose;
# the /jot carve-out — see skills/digest.md hard rule 5), so no
# verify gate runs here either. Shares the march concurrency
# group so cloud writers never race.

on:
  schedule:
    - cron: '30 10 * * *'   # daily ~06:30 ET, after e2e-full + the overnight ticks
  workflow_dispatch:

concurrency:
  group: march              # one cloud writer at a time, ever
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: read
      actions: read         # gh run list — the pulse (march + e2e-full)
      id-token: write
    steps:
      - name: Checkout (full history for the pulse)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so git push commits as the human
          # user — same identity posture as march.yml.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Deps are needed only for `pnpm deploy:check` (the deploy
      # pulse). No Playwright, no Supabase — the digest never runs
      # the gate (notes-only carve-out).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Git author identity is set via GIT_AUTHOR_* / GIT_COMMITTER_*
      # env vars on the action step below, NOT via `git config` —
      # same mechanism and rationale as march.yml (the action's
      # internal git config would override a workflow-step config).

      - name: Run /digest (night shift)
        # Same action pin as march.yml — drift-control on the wrapper.
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1.0.122
        timeout-minutes: 20
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Synthesis is where a stronger model earns its keep; the
          # night model leads the day one.
          claude_args: |
            --model claude-sonnet-5
            --dangerously-skip-permissions
          prompt: |
            You are tiered.tv's night shift running in CI. Read agents.md
            first, then execute skills/digest.md end to end — it is the
            single source of truth for this tick.

            Cloud notes:

            1. The digest is a NOTES-ONLY commit (plan/DIGEST.md, plus any
               plan/AUDIT.md or plan/PHASE_CANDIDATES.md rows). The /jot
               carve-out applies: no verify gate, no deploy gate. Do not
               run pnpm verify this tick, foreground or otherwise.
            2. The breadth verdict comes from the latest e2e-full run
               (gh run list --workflow e2e-full) — read it, never re-run
               it. A red run becomes a HIGH plan/AUDIT.md row.
            3. Tuning proposals become plan/PHASE_CANDIDATES.md candidates,
               never direct edits. Only local /oversight promotes.
            4. Your one commit MUST end with this exact trailer (a blank
               line before it, then the trailer as its own line):

                  Cloud-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            5. One commit (digest: <YYYY-MM-DD>), push, exit. If the tick
               cannot ship cleanly, exit with a one-line note in this log
               — do not half-commit.
        env:
          # Deploy pulse (pnpm deploy:check reads the state at HEAD)
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ vars.VERCEL_PROJECT }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          # ACTIONS_PAT so gh calls and the push identify as the human.
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          # Author identity — same env-var path as march.yml.
          GIT_AUTHOR_NAME:     'David Rehmat'
          GIT_AUTHOR_EMAIL:    'me@dave.blue'
          GIT_COMMITTER_NAME:  'David Rehmat'
          GIT_COMMITTER_EMAIL: 'me@dave.blue'

      - name: Open night-failed issue if action crashed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
        run: |
          existing=$(gh issue list --search 'in:title "Night digest crashed" state:open' --json number --jq 'length')
          if [ "$existing" -eq 0 ]; then
            gh issue create \
              --title "Night digest crashed: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --body "The night shift exited non-zero. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "An open 'Night digest crashed' issue already exists — skipping."
          fi
